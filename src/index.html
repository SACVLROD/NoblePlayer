<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>NoblePlayer</title>
    <link rel="stylesheet" href="styles.css" />
    <script type="module" src="/main.js" defer></script>
  </head>

  <body>
    <!-- Transparent backdrop for dynamic visual blur transitions -->
    <div class="app-background" id="app-background"></div>
    <div class="app-overlay"></div>

    <div class="window-container">
      <header class="drag-bar" data-tauri-drag-region>
        <div class="window-controls">
          <!-- Language Toggle -->
          <button id="toggle-lang" title="Cambiar idioma" data-i18n="tooltipLang" class="icon-btn" style="font-size: 11px; font-weight: bold;">ES</button>
          
          <!-- Theme Toggle: Moon = Dark, Sun = Light, Glass = Smart Glass -->
          <button id="toggle-theme" title="Cambiar tema" data-i18n="tooltipTheme" class="icon-btn">
            <!-- Moon icon (shown in dark mode) -->
            <svg id="icon-moon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
            <!-- Sun icon (shown in light mode) -->
            <svg id="icon-sun" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="hidden">
              <circle cx="12" cy="12" r="5"></circle>
              <line x1="12" y1="1" x2="12" y2="3"></line>
              <line x1="12" y1="21" x2="12" y2="23"></line>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
              <line x1="1" y1="12" x2="3" y2="12"></line>
              <line x1="21" y1="12" x2="23" y2="12"></line>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>

          </button>
          


          <button id="toggle-playlist" title="Lista de reproducción" data-i18n="tooltipPlaylist" class="icon-btn">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="8" y1="6" x2="21" y2="6"></line>
              <line x1="8" y1="12" x2="21" y2="12"></line>
              <line x1="8" y1="18" x2="21" y2="18"></line>
              <line x1="3" y1="6" x2="3.01" y2="6"></line>
              <line x1="3" y1="12" x2="3.01" y2="12"></line>
              <line x1="3" y1="18" x2="3.01" y2="18"></line>
            </svg>
          </button>
        </div>
      </header>

      <!-- Main Player Screen -->
      <main class="player-main">
        <!-- Album Art Card with Glassmorphism shadow -->
        <div class="art-container" id="art-container">
          <div class="album-art-wrapper">
            <img id="album-art" src="placeholder.png" alt="Portada del álbum" />
            <!-- Beautiful minimalist music note fallback icon -->
            <div id="art-placeholder" class="placeholder-art hidden">
              <svg viewBox="0 0 24 24" width="70" height="70" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 18V5l12-2v13"></path>
                <circle cx="6" cy="18" r="3"></circle>
                <circle cx="18" cy="16" r="3"></circle>
              </svg>
            </div>
          </div>
        </div>

        <!-- Right Column Controls Wrapper for stability and vertical alignment -->
        <div class="player-controls-column">
          <!-- Song Metadata Section -->
          <div class="metadata-container">
            <div class="title-scroller">
              <h1 id="song-title">Carga tu música</h1>
            </div>
            <p id="song-artist">Arrastra archivos aquí o abre la playlist</p>
            <p id="song-album-year" class="album-details"></p>
          </div>

          <!-- Dynamic Audio Wave Visualizer (24-bar layout) -->
          <div class="visualizer-container" id="visualizer">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
          </div>

          <!-- Seek Timeline Slider (Custom DIV-based slider for perfect WebKit scrubbing) -->
          <div class="timeline-container">
            <span class="time-display" id="time-current">00:00</span>
            <div class="slider-wrapper" id="seek-bar-container">
              <div class="slider-track">
                <div class="slider-progress" id="seek-progress"></div>
                <div class="slider-thumb" id="seek-thumb"></div>
              </div>
            </div>
            <span class="time-display" id="time-total">00:00</span>
          </div>

          <!-- Controls Section -->
          <div class="controls-container">
            <!-- Shuffle Button -->
            <button id="btn-shuffle" class="control-btn secondary-btn" title="Aleatorio" data-i18n="tooltipShuffle">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="16 3 21 3 21 8"></polyline>
                <line x1="4" y1="20" x2="21" y2="3"></line>
                <polyline points="21 16 21 21 16 21"></polyline>
                <line x1="15" y1="15" x2="21" y2="21"></line>
                <line x1="4" y1="4" x2="9" y2="9"></line>
              </svg>
            </button>

            <!-- Previous Track -->
            <button id="btn-prev" class="control-btn primary-btn" title="Anterior" data-i18n="tooltipPrev">
              <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
                <path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/>
              </svg>
            </button>

            <!-- Large Play / Pause button -->
            <button id="btn-play-pause" class="control-btn play-btn" title="Reproducir" data-i18n="tooltipPlay">
              <svg id="play-icon" viewBox="0 0 24 24" width="28" height="28" fill="currentColor">
                <path d="M8 5v14l11-7z"/>
              </svg>
              <svg id="pause-icon" viewBox="0 0 24 24" width="28" height="28" fill="currentColor" class="hidden">
                <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
              </svg>
            </button>

            <!-- Next Track -->
            <button id="btn-next" class="control-btn primary-btn" title="Siguiente" data-i18n="tooltipNext">
              <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
                <path d="M6 18l8.5-6L6 6zm9-12h2v12h-2z"/>
              </svg>
            </button>

            <!-- Repeat Track Toggler -->
            <button id="btn-repeat" class="control-btn secondary-btn" title="Repetir" data-i18n="tooltipRepeat">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="17 1 21 5 17 9"></polyline>
                <path d="M3 11V9a4 4 0 0 1 4-4h14"></path>
                <polyline points="7 23 3 19 7 15"></polyline>
                <path d="M21 13v2a4 4 0 0 1-4 4H3"></path>
              </svg>
              <span id="repeat-badge" class="badge hidden">1</span>
            </button>
          </div>
        </div>

        <!-- Volume Footer -->
        <footer class="player-footer">
          <div class="volume-container">
            <button id="btn-volume-toggle" class="volume-btn icon-btn" title="Silenciar" data-i18n="tooltipMute">
              <svg id="volume-high" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
              </svg>
              <svg id="volume-muted" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="hidden">
                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                <line x1="23" y1="9" x2="17" y2="15"></line>
                <line x1="17" y1="9" x2="23" y2="15"></line>
              </svg>
            </button>
            <div class="slider-wrapper volume-slider-wrapper" id="volume-bar-container">
              <div class="slider-track">
                <div class="slider-progress" id="volume-progress"></div>
                <div class="slider-thumb" id="volume-thumb"></div>
              </div>
            </div>
          </div>
        </footer>
      </main>

      <!-- Sidebar Sliding Panel: Playlist Queue -->
      <section class="drawer-panel" id="playlist-panel">
        <div class="drawer-drag-bar" data-tauri-drag-region></div>
        <header class="drawer-header" data-tauri-drag-region>
          <div style="display: flex; align-items: center; gap: 8px;" data-tauri-drag-region>
            <h2 data-i18n="playlistTitle" data-tauri-drag-region>Lista de reproducción</h2>
            <span class="app-version-tag">v1.1.5</span>
          </div>
          <button id="close-playlist" class="icon-btn round-close" title="Cerrar" data-i18n="tooltipClose">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>
        </header>

        <!-- Queue Toolbar: Search & Buttons -->
        <div class="drawer-actions">
          <div class="search-row">
            <div class="search-box">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" class="search-icon">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
              </svg>
              <input type="text" id="playlist-search" data-i18n-placeholder="searchPlaceholder" placeholder="Buscar artista, canción..." />
            </div>
            <button id="btn-sort-playlist" class="icon-btn" data-i18n="tooltipSortAZ" title="Ordenar A-Z">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="4" y1="6" x2="14" y2="6"></line>
                <line x1="4" y1="12" x2="14" y2="12"></line>
                <line x1="4" y1="18" x2="10" y2="18"></line>
                <polyline id="sort-arrow" points="15 15 19 19 23 15"></polyline>
                <line x1="19" y1="5" x2="19" y2="19"></line>
              </svg>
            </button>
          </div>
          <div class="action-buttons">
            <button id="btn-add-files" class="text-btn success-btn" title="Añadir canciones" data-i18n="tooltipAddFiles">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right:4px;">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
              </svg>
              <span data-i18n="btnSongs">Canciones</span>
            </button>
            <button id="btn-add-folder" class="text-btn success-btn" title="Añadir carpeta" data-i18n="tooltipAddFolder">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right:4px;">
                <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
                <line x1="12" y1="11" x2="12" y2="17"></line>
                <line x1="9" y1="14" x2="15" y2="14"></line>
              </svg>
              <span data-i18n="btnFolder">Carpeta</span>
            </button>
            <button id="btn-clear-queue" class="text-btn danger-btn" title="Limpiar lista" data-i18n="tooltipClear">
              <span data-i18n="btnClear">Limpiar</span>
            </button>
          </div>
        </div>

        <!-- Scrollable Playlist Queue List -->
        <div class="playlist-items-wrapper" id="playlist-queue">
          <!-- Drop Area Placeholder when queue is empty -->
          <div class="empty-state" id="queue-empty-state">
            <svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
              <polyline points="17 8 12 3 7 8"></polyline>
              <line x1="12" y1="3" x2="12" y2="15"></line>
            </svg>
            <p data-i18n="emptyQueue">Arrastra tus archivos de música o pulsa "Canciones" o "Carpeta" para comenzar.</p>
          </div>
          <ul class="queue-list" id="queue-list"></ul>
        </div>
      </section>
    </div>
  </body>
</html>
